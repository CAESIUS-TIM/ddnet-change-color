<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="256" height="256" viewBox="0 0 256 256" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D7DD2"/>
      <stop offset="100%" stop-color="#1A5CA6"/>
    </linearGradient>
    <linearGradient id="paletteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66CCFF"/>
      <stop offset="100%" stop-color="#2D7DD2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bgGradient)"/>
  
  <!-- Palette Base -->
  <ellipse cx="128" cy="140" rx="70" ry="60" fill="white" fill-opacity="0.9"/>
  
  <!-- Color Wells on Palette -->
  <circle cx="98" cy="120" r="18" fill="#FF9900"/>
  <circle cx="128" cy="120" r="18" fill="#2D7DD2"/>
  <circle cx="158" cy="120" r="18" fill="#66CCFF"/>
  
  <!-- Dropper -->
  <path d="M 80,80 L 100,60 Q 120,50 140,60 L 160,80 L 145,95 Q 135,105 125,95 Z" fill="#FFFFFF" fill-opacity="0.9"/>
  <rect x="139" y="90" width="6" height="40" rx="3" fill="#FFFFFF" fill-opacity="0.9"/>
  
  <!-- DCC Text (Subtle) -->
  <text x="128" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" fill-opacity="0.8">DCC</text>
  
  <!-- Outer Ring -->
  <circle cx="128" cy="128" r="124" fill="none" stroke="white" stroke-width="4" stroke-opacity="0.3"/>
</svg>